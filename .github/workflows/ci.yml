name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cf
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cf/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run worker tests
        run: npm test

  webui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run webui tests
        run: npm test

      - name: Typecheck webui
        run: npm run typecheck

      - name: Build webui
        run: npm run build
