name = "cf-telegram-bot"
main = "cf/src/index.ts"
compatibility_date = "2026-01-30"
compatibility_flags = ["nodejs_compat"]
preview_urls = false

# Account settings (optional - can be set via CLI or Dashboard)
# account_id = "your-account-id"

# Workers configuration
[vars]
DEBUG_RESTART = "1"
# Non-secret environment variables (secrets should be set via `wrangler secret put`)
# WEBUI_AUTH_TOKEN = "set-via-secret"
# TELEGRAM_BOT_TOKEN = "set-via-secret-or-ui"
# LLM provider keys are normally configured in WebUI -> LLM Config.
# Legacy fallback only:
# OPENAI_API_KEY = "set-via-secret"
# OPENAI_BASE_URL = "https://api.openai.com/v1"
# OPENAI_DEFAULT_MODEL = "legacy-default-model"

# Durable Objects for state management
[durable_objects]
bindings = [{ name = "STATE_STORE", class_name = "StateStore" }]

# Cloudflare Workflows for durable Telegram webhook background handling.
[[workflows]]
binding = "TELEGRAM_UPDATE_WORKFLOW"
name = "cf-telegram-bot-telegram-update"
class_name = "TelegramUpdateWorkflow"

[[workflows]]
binding = "AGENT_TASK_WORKFLOW"
name = "cf-telegram-bot-agent-task"
class_name = "AgentTaskWorkflow"

# Static assets (WebUI)
[assets]
directory = "webui_dist"
binding = "ASSETS"

# R2 storage for file caching
[[r2_buckets]]
binding = "FILE_BUCKET"
bucket_name = "tg-button-cache"

# Optional D1 storage for custom Markdown skills. Create a D1 database in
# Cloudflare Dashboard, then add the binding with this exact name.
# The Worker initializes tables automatically via /api/actions/skills/init
# or on first Skills page/API access.
# [[d1_databases]]
# binding = "SKILLS_DB"
# database_name = "cf-telegram-bot-skills"
# database_id = "replace-with-your-d1-database-id"

# Durable Objects migrations - use new_sqlite_classes for free plan
[[migrations]]
tag = "v1"
new_sqlite_classes = ["StateStore"]

# Build configuration - runs before deploy
[build]
command = "cd webui && npm install && npm run build"

# Observability (optional)
[observability]
enabled = true
